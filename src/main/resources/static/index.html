<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checker Corporate</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #ffffff;
            --primary: #2563eb;
            --text: #0f172a;
            --muted: #64748b;
        }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            color: var(--text);
            padding: 1rem;
        }
        .card {
            width: min(560px, 100%);
            background: var(--panel);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
        }
        h1 {
            margin-top: 0;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            margin-top: 0.6rem;
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.8rem;
            font-size: 1rem;
            cursor: pointer;
        }
        pre {
            margin-top: 1rem;
            background: #f1f5f9;
            padding: 0.8rem;
            border-radius: 6px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Checker Corporate</h1>
        <p>Введите ИНН юрлица и проверьте его статус через DaData.</p>
        <label for="inn">ИНН</label>
        <input id="inn" placeholder="например 9710083390" maxlength="12" />
        <button id="checkBtn">Проверить</button>
        <pre id="result">Нажмите кнопку для проверки.</pre>
    </main>
    <script>
        const input = document.getElementById("inn");
        const button = document.getElementById("checkBtn");
        const result = document.getElementById("result");

        async function checkInn() {
            const inn = encodeURIComponent(input.value.trim());
            if (!inn) {
                result.textContent = "Введите ИНН";
                return;
            }
            const response = await fetch(`/api/check?inn=${inn}`, {
                headers: {"Accept": "application/json"}
            });
            const payload = await response.json();
            result.textContent = JSON.stringify(payload, null, 2);
        }

        button.addEventListener("click", checkInn);
    </script>
</body>
</html>
