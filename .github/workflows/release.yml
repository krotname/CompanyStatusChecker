name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build
        run: ./mvnw -B -DskipTests clean package
      - name: Resolve release artifact
        run: |
          set -euo pipefail
          release_jar="$(find target -maxdepth 1 -type f -name 'checker-corporate-*.jar' ! -name 'original-*' ! -name '*-sources.jar' ! -name '*-javadoc.jar' -print -quit)"
          sources_jar="$(find target -maxdepth 1 -type f -name 'checker-corporate-*-sources.jar' -print -quit)"
          javadoc_jar="$(find target -maxdepth 1 -type f -name 'checker-corporate-*-javadoc.jar' -print -quit)"
          if [ -z "$release_jar" ]; then
            echo "Release JAR was not found" >&2
            exit 1
          fi
          if [ -z "$sources_jar" ]; then
            echo "Sources JAR was not found" >&2
            exit 1
          fi
          if [ -z "$javadoc_jar" ]; then
            echo "Javadoc JAR was not found" >&2
            exit 1
          fi
          {
            echo "RELEASE_JAR=$release_jar"
            echo "SOURCES_JAR=$sources_jar"
            echo "JAVADOC_JAR=$javadoc_jar"
          } >> "$GITHUB_ENV"
      - name: Generate release checksums
        run: |
          sha256sum \
            "$RELEASE_JAR" \
            "$SOURCES_JAR" \
            "$JAVADOC_JAR" \
            target/bom.xml \
            target/bom.json > target/checksums.txt
          cat target/checksums.txt
      - name: Generate artifact provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: target/checksums.txt
      - name: Generate SBOM attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ${{ env.RELEASE_JAR }}
          sbom-path: target/bom.json
      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/krotname/company-status-checker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          files: |
            ${{ env.RELEASE_JAR }}
            ${{ env.SOURCES_JAR }}
            ${{ env.JAVADOC_JAR }}
            target/bom.xml
            target/bom.json
            target/checksums.txt
