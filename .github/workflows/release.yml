name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build
        run: ./mvnw -B -DskipTests package
      - name: Resolve release artifact
        run: |
          set -euo pipefail
          release_jar="$(find target -maxdepth 1 -type f -name 'checker-corporate-*.jar' ! -name 'original-*' -print -quit)"
          if [ -z "$release_jar" ]; then
            echo "Release JAR was not found" >&2
            exit 1
          fi
          echo "RELEASE_JAR=$release_jar" >> "$GITHUB_ENV"
      - name: Generate artifact provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.RELEASE_JAR }}
      - name: Generate SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.RELEASE_JAR }}
          sbom-path: target/bom.json
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            ${{ env.RELEASE_JAR }}
            target/bom.xml
            target/bom.json
