name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build
        run: ./mvnw -B -DskipTests clean package
      - name: Resolve release artifact
        run: |
          set -euo pipefail
          release_jar="$(find target -maxdepth 1 -type f -name 'checker-corporate-*.jar' ! -name 'original-*' -print -quit)"
          if [ -z "$release_jar" ]; then
            echo "Release JAR was not found" >&2
            exit 1
          fi
          echo "RELEASE_JAR=$release_jar" >> "$GITHUB_ENV"
      - name: Generate artifact provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.RELEASE_JAR }}
      - name: Generate SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.RELEASE_JAR }}
          sbom-path: target/bom.json
      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/krotname/company-status-checker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            ${{ env.RELEASE_JAR }}
            target/bom.xml
            target/bom.json
