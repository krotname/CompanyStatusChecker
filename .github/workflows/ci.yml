name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build and test
        run: ./mvnw -B clean verify
      - name: Build Docker image
        run: docker build --pull -t company-status-checker:ci .
      - name: Smoke test Docker image
        run: |
          set -euo pipefail
          container_id="$(docker run -d -e DADATA_TOKEN=dummy -p 18080:8080 company-status-checker:ci --server 8080)"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:18080/health | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: |
            target/bom.xml
            target/bom.json
      - name: Upload JaCoCo coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
          verbose: true
