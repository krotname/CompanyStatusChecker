name: CI Checker Corporate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-categories:
    name: ${{ matrix.category }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - category: unit
            profile: unit-tests
          - category: integration
            profile: integration-tests
          - category: ui
            profile: ui-tests
          - category: contract
            profile: contract-tests
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run ${{ matrix.category }} tests
        run: ./mvnw -B clean test -P${{ matrix.profile }}
      - name: Upload ${{ matrix.category }} test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: surefire-${{ matrix.category }}-tests
          path: target/surefire-reports
          if-no-files-found: ignore

  build:
    name: full verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build and test
        run: ./mvnw -B clean verify
      - name: Build Docker image
        run: docker build --pull -t company-status-checker:ci .
      - name: Inspect Docker image metadata
        run: |
          set -euo pipefail
          image_user="$(docker image inspect company-status-checker:ci --format '{{ .Config.User }}')"
          if [ "$image_user" != "app" ]; then
            echo "Expected Docker image to run as app, got: $image_user" >&2
            exit 1
          fi
          docker image inspect company-status-checker:ci --format '{{ json .Config.Healthcheck.Test }}' | grep -q 'ContainerHealthCheck'
      - name: Smoke test Docker image
        run: |
          set -euo pipefail
          container_id="$(docker run --user app -d -e DADATA_TOKEN=dummy -p 18080:8080 company-status-checker:ci --server 8080)"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT

          ready=0
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:18080/health | grep -q '"status":"ok"'; then
              ready=1
              break
            fi
            sleep 1
          done

          if [ "$ready" -ne 1 ]; then
            docker logs "$container_id"
            exit 1
          fi

          docker exec "$container_id" java -cp /app/app.jar com.krotname.checker.ContainerHealthCheck
          docker logs "$container_id"
      - name: Upload Maven package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maven-package-artifacts
          path: |
            target/checker-corporate-*.jar
            !target/original-*.jar
          if-no-files-found: error
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cyclonedx-sbom
          path: |
            target/bom.xml
            target/bom.json
      - name: Upload SpotBugs report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          if-no-files-found: error
      - name: Upload JaCoCo coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
          verbose: true
